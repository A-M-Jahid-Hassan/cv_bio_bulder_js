<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Preview — Biodata Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body data-page="preview">

  <div id="loader" class="loader-overlay hidden">
    <div class="loader-spinner"></div>
    <p>Loading preview…</p>
  </div>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">
        <span class="brand-icon">📋</span>
        <span class="brand-name">Biodata Builder</span>
      </a>
      <button class="navbar-toggle" id="navbar-toggle" aria-label="Toggle menu">
        <span class="toggle-bar"></span>
        <span class="toggle-bar"></span>
        <span class="toggle-bar"></span>
      </button>
      <div class="navbar-links" id="navbar-links">
        <a href="templates.html" class="nav-link">Biodata</a>
        <a href="index.html"     class="nav-link">About</a>
      </div>
    </div>
  </nav>

  <!-- Preview topbar -->
  <div class="preview-topbar">
    <button class="btn btn-ghost" id="btn-edit-again">← Edit</button>
    <h2 class="preview-page-title">PDF Preview</h2>
    <button class="btn btn-success" id="btn-download-pdf">⬇ Download PDF</button>
  </div>

  <!-- Full-width preview paper -->
  <div class="final-preview-wrap">
    <div class="final-preview-paper">
      <div id="final-preview-content">
        <!-- Rendered by previewEngine from sessionStorage state -->
      </div>
    </div>
  </div>

  <!-- html2pdf loaded locally — must come before app.js -->
  <script src="assets/libs/html2pdf.bundle.min.js"></script>
  <script src="assets/js/stateManager.js"></script>
  <script src="assets/js/router.js"></script>
  <script src="assets/js/templateLoader.js"></script>
  <script src="assets/js/previewEngine.js"></script>
  <script src="assets/js/pdfGenerator.js"></script>
  <script src="assets/js/app.js"></script>

</body>
</html>
