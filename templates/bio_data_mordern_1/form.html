<div class="form-wrapper">
  <h2 class="form-main-title">Bio Data</h2>

  <div class="form-section">
    <h3 class="form-section-title">Personal Information</h3>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="full_name">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" name="phone">
      </div>
    </div>

    <div class="form-group">
      <label>Date of Birth</label>
      <input type="date" name="dob">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Height</label>
        <input type="text" name="height">
      </div>
      <div class="form-group">
        <label>Weight</label>
        <input type="text" name="weight">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Blood Group</label>
        <input type="text" name="blood_group">
      </div>
      <div class="form-group">
        <label>Religion</label>
        <input type="text" name="religion">
      </div>
    </div>

    <div class="form-group">
      <label>Profession</label>
      <input type="text" name="profession">
    </div>

    <div class="form-group">
      <label>Present Address</label>
      <textarea name="present_address"></textarea>
    </div>

    <div class="form-group">
      <label>Permanent Address</label>
      <textarea name="permanent_address"></textarea>
    </div>
  </div>

  <div class="form-section">
    <h3 class="form-section-title">Educational Qualification</h3>

    <div class="form-subsection">
      <div class="subsection-label">Latest</div>
      <div class="form-group"><input type="text" name="education_1_degree" placeholder="Degree"></div>
      <div class="form-group"><input type="text" name="education_1_institution" placeholder="Institution"></div>
      <div class="form-row">
        <input type="text" name="education_1_year" placeholder="Year">
        <input type="text" name="education_1_result" placeholder="Result">
      </div>
    </div>

    <div class="form-subsection">
      <div class="subsection-label">Previous</div>
      <div class="form-group"><input type="text" name="education_2_degree" placeholder="Degree"></div>
      <div class="form-group"><input type="text" name="education_2_institution" placeholder="Institution"></div>
      <div class="form-row">
        <input type="text" name="education_2_year" placeholder="Year">
        <input type="text" name="education_2_result" placeholder="Result">
      </div>
    </div>
  </div>

  <div class="form-section">
    <h3 class="form-section-title">Family Information</h3>

    <div class="form-group"><input type="text" name="father_name" placeholder="Father's Name"></div>
    <div class="form-group"><input type="text" name="father_profession" placeholder="Father's Profession"></div>
    <div class="form-group"><input type="text" name="mother_name" placeholder="Mother's Name"></div>
    <div class="form-group"><input type="text" name="mother_profession" placeholder="Mother's Profession"></div>

    <div class="form-group">
      <textarea name="siblings_details" placeholder="Siblings Details"></textarea>
    </div>
  </div>

  <div class="form-section">
    <h3 class="form-section-title">Interests</h3>
    <textarea name="hobbies"></textarea>
  </div>
</div>
